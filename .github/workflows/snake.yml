name: Generate Snake

on:
schedule:
- cron: "0 */12 * * *"
workflow_dispatch:

jobs:
generate:
runs-on: ubuntu-latest

```
steps:
  - uses: Platane/snk@v3
    with:
      github_user_name: IronsSideDEV

      outputs: |
        dist/github-contribution-grid-snake.svg?color_snake=ff2020&color_dots=#140000,#220000,#330000,#440000,#660000
        dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ff2020&color_dots=#140000,#220000,#330000,#440000,#660000

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  - uses: crazy-max/ghaction-github-pages@v3
    with:
      target_branch: output
      build_dir: dist

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
