name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: IronsSideDEV
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make Snake Red
        run: |
          cp dist/github-contribution-grid-snake-dark.svg snake.svg

          sed 's/#39d353/#ff2020/g' snake.svg > temp.svg
          mv temp.svg snake.svg

          sed 's/#26a641/#ff2020/g' snake.svg > temp.svg
          mv temp.svg snake.svg

          sed 's/#006d32/#ff2020/g' snake.svg > temp.svg
          mv temp.svg snake.svg

          sed 's/#0e4429/#ff2020/g' snake.svg > temp.svg
          mv temp.svg snake.svg

          mv snake.svg dist/github-contribution-grid-snake-dark.svg

      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
